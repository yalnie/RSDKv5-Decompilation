name: Build RSDKv5

on: workflow_dispatch

# each artifact is like 15MB so we'll start by only doing it manually
# on:
#   push:
#     branches:
#       - master

jobs:
  v5-windows:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: pkg-config make git mingw-w64-i686-gcc mingw-w64-i686-libogg mingw-w64-i686-libtheora
      - name: Build RSDKv5 + U
        run: |
          make -j8 RSDK_ONLY=1 AUTOBUILD=1
          make -j8 RSDK_ONLY=1 RSDK_REVISION=3 AUTOBUILD=1
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./bin/Windows/DX9/*.exe ./artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-windows
          path: artifacts

  v5-windows-x64:
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: pkg-config make git mingw-w64-x86_64-gcc mingw-w64-x86_64-SDL2 mingw-w64-x86_64-libogg mingw-w64-x86_64-libtheora
      - name: Build RSDKv5 + U
        run: |
          make -j8 RSDK_ONLY=1 AUTOBUILD=1
          make -j8 RSDK_ONLY=1 RSDK_REVISION=3 AUTOBUILD=1
      - name: Move artifacts
        run: |
          mkdir artifacts
          mv ./bin/Windows/DX9/*.exe ./artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-windows-x64
          path: artifacts

  v5-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libogg-dev libsdl2-dev libtheora-dev libglew-dev libglfw3-dev
      - name: Build RSDKv5 + U GL3
        run: |
          make -j8 RSDK_ONLY=1 AUTOBUILD=1
          make -j8 RSDK_ONLY=1 RSDK_REVISION=3 AUTOBUILD=1
      - name: Build RSDKv5 + U SDL2
        run: |
          make -j8 RSDK_ONLY=1 SUBSYSTEM=SDL2 AUTOBUILD=1
          make -j8 RSDK_ONLY=1 SUBSYSTEM=SDL2 RSDK_REVISION=3 AUTOBUILD=1
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v5-linux
          path: bin/Linux

  v5-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # CMakeLists.txt dosyanı hiç bozmamak için eksik kütüphane kaynak kodlarını internetten çekip yerleştiriyoruz
      - name: Download and Setup Ogg/Theora Sources for Android CMake
        run: |
          mkdir -p dependencies/android/libogg
          mkdir -p dependencies/android/libtheora
          
          # Ogg Kaynak Kodları
          curl -L -O https://downloads.xiph.org/releases/ogg/libogg-1.3.5.zip
          unzip libogg-1.3.5.zip
          cp -r libogg-1.3.5/* dependencies/android/libogg/
          
          # Theora Kaynak Kodları
          curl -L -O https://downloads.xiph.org/releases/theora/libtheora-1.1.1.zip
          unzip libtheora-1.1.1.zip
          cp -r libtheora-1.1.1/* dependencies/android/libtheora/

      - name: Change to Android Directory & Grant Execute Permission for Gradlew
        run: |
          cd android
          chmod +x gradlew

      - name: Build with Gradle (Debug APK)
        run: |
          cd android
          ./gradlew assembleDebug -PABIFILTERS="arm64-v8a;armeabi-v7a;x86;x86_64"

      - name: Upload Android APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: v5-android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
